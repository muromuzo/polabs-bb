<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏥 비급여 진료비 분석</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  body { font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; }

  /* ── 칩 공통 ── */
  .chip {
    display:inline-flex; align-items:center; padding:5px 14px; border-radius:999px;
    font-size:13px; cursor:pointer; border:1.5px solid #cbd5e1; background:#f8fafc;
    color:#475569; transition:all .15s; margin:3px; user-select:none; white-space:nowrap;
  }
  .chip:hover { border-color:#3b82f6; color:#2563eb; background:#eff6ff; }
  .chip.on   { background:#3b82f6; border-color:#3b82f6; color:#fff; font-weight:600; }
  .chip.on:hover { background:#2563eb; }

  /* ── 과목 카드 ── */
  .cat-card {
    border:2px solid #e2e8f0; border-radius:12px; padding:14px 16px; cursor:pointer;
    transition:all .15s; background:#fff; min-width:120px; text-align:center;
    user-select:none; position:relative;
  }
  .cat-card:hover { border-color:#93c5fd; background:#f0f9ff; }
  .cat-card.on {
    border-color:#3b82f6; background:#eff6ff;
    box-shadow:0 0 0 3px rgba(59,130,246,.15);
  }
  .cat-card .cnt {
    position:absolute; top:8px; right:10px;
    font-size:10px; background:#e2e8f0; color:#64748b;
    padding:1px 7px; border-radius:999px;
  }
  .cat-card.on .cnt { background:#bfdbfe; color:#1d4ed8; }

  /* ── 테이블 ── */
  th { cursor:pointer; user-select:none; white-space:nowrap; }
  th:hover { background:#dbeafe !important; }
  th .si { margin-left:4px; opacity:.35; font-size:10px; }
  th .si::after { content:'⇅'; }
  th.asc  .si::after { content:'▲'; opacity:1; }
  th.desc .si::after { content:'▼'; opacity:1; }
  tr:hover td { background:#f0f9ff; }

  /* ── 진행 바 ── */
  .pbar { height:6px; background:#e2e8f0; border-radius:3px; overflow:hidden; }
  .pfill { height:100%; background:linear-gradient(90deg,#3b82f6,#60a5fa); transition:width .3s; }

  /* ── 요약 카드 ── */
  .sum-card { background:linear-gradient(135deg,#f0f9ff,#e0f2fe); border:1px solid #bae6fd; border-radius:10px; padding:16px; }

  /* ── 스텝 배지 ── */
  .step-badge {
    display:inline-flex; align-items:center; justify-content:center;
    width:24px; height:24px; border-radius:50%;
    background:#3b82f6; color:#fff; font-size:12px; font-weight:700;
    margin-right:8px; flex-shrink:0;
  }
  .step-badge.done { background:#10b981; }

  @keyframes spin { to { transform:rotate(360deg); } }
  .spin { animation:spin .8s linear infinite; display:inline-block; }
</style>
</head>
<body class="bg-slate-50 min-h-screen">

<!-- ══ 헤더 ══════════════════════════════════════════════════════════ -->
<header class="bg-gradient-to-r from-blue-700 to-blue-500 text-white px-6 py-4 shadow-lg sticky top-0 z-10">
  <div class="max-w-7xl mx-auto flex items-center justify-between flex-wrap gap-2">
    <div>
      <h1 class="text-lg font-bold tracking-tight">🏥 비급여 진료비 지역별 분석</h1>
      <p class="text-blue-100 text-xs mt-0.5">건강보험심사평가원 · 공공데이터포털 API</p>
    </div>
    <div id="hdrStats" class="hidden text-right text-xs text-blue-100 space-y-0.5"></div>
  </div>
</header>

<div class="max-w-7xl mx-auto px-4 py-5 space-y-4">

  <!-- ══ STEP 1 : 조회 설정 ════════════════════════════════════════ -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
    <h2 class="flex items-center text-base font-semibold text-gray-700 mb-4">
      <span class="step-badge" id="s1badge">1</span> 조회 설정
    </h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <!-- 시도 -->
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">🗺️ 지역 (시도)</label>
        <select id="sido" onchange="onSidoChange()" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
          <option value="">전체</option>
          <option value="110000">서울</option><option value="210000">부산</option>
          <option value="220000">대구</option><option value="230000">인천</option>
          <option value="240000">광주</option><option value="250000">대전</option>
          <option value="260000">울산</option><option value="290000">세종</option>
          <option value="410000">경기</option><option value="420000">강원</option>
          <option value="430000">충북</option><option value="440000">충남</option>
          <option value="450000">전북</option><option value="460000">전남</option>
          <option value="470000">경북</option><option value="480000">경남</option>
          <option value="490000">제주</option>
        </select>
      </div>
      <!-- 기관 종별 -->
      <div class="sm:col-span-2">
        <label class="block text-xs font-medium text-gray-500 mb-2">🏥 기관 종별 <span class="font-normal text-gray-400">(복수 선택 가능 · 미선택 시 전체)</span></label>
        <div id="clCdChips" class="flex flex-wrap gap-2">
          <span class="chip" data-cd="01">상급종합병원</span>
          <span class="chip" data-cd="11">종합병원</span>
          <span class="chip on" data-cd="21">병원</span>
          <span class="chip" data-cd="41">치과병원</span>
          <span class="chip" data-cd="92">한방병원</span>
          <span class="chip" data-cd="28">요양병원</span>
        </div>
      </div>
      <!-- 구/군 (시도 선택 시 표시) -->
      <div id="sgguRow" class="hidden sm:col-span-2">
        <div class="flex items-center justify-between mb-2">
          <label class="block text-xs font-medium text-gray-500">📍 구/군 <span class="font-normal text-gray-400">(복수 선택 가능 · 미선택 시 전체)</span></label>
          <div class="flex gap-2">
            <button onclick="selectAllSggu()" class="text-xs text-blue-500 border border-blue-200 px-2 py-0.5 rounded hover:bg-blue-50">전체</button>
            <button onclick="clearSggu()" class="text-xs text-gray-400 border border-gray-200 px-2 py-0.5 rounded hover:bg-gray-50">해제</button>
          </div>
        </div>
        <div id="sgguChips" class="flex flex-wrap gap-2 max-h-28 overflow-y-auto"></div>
      </div>
    </div>
    <!-- 버튼 영역 -->
    <div class="mt-4 flex flex-wrap gap-3 items-center">
      <button id="loadBtn" onclick="loadData()"
        class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold px-6 py-2.5 rounded-lg text-sm shadow transition flex items-center gap-2">
        <span id="btnIco">📥</span><span id="btnTxt">데이터 불러오기</span>
      </button>
      <button onclick="resetAll()"
        class="border border-gray-200 text-gray-500 hover:text-gray-700 px-4 py-2.5 rounded-lg text-sm transition">
        🔄 초기화
      </button>
      <span id="statusMsg" class="text-sm text-gray-500"></span>
    </div>
    <!-- 진행 바 -->
    <div id="pWrap" class="mt-3 hidden">
      <div class="pbar"><div id="pFill" class="pfill" style="width:0%"></div></div>
      <p id="pTxt" class="text-xs text-gray-500 mt-1"></p>
    </div>
    <!-- 오류 -->
    <div id="errBox" class="hidden mt-3 bg-red-50 border border-red-200 rounded-lg p-3 text-sm text-red-700 leading-relaxed"></div>
  </div>

  <!-- ══ STEP 2 : 과목 선택 ═════════════════════════════════════════ -->
  <div id="catSection" class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
    <div class="flex items-center justify-between flex-wrap gap-2 mb-4">
      <h2 class="flex items-center text-base font-semibold text-gray-700">
        <span class="step-badge" id="s2badge">2</span>
        과목 선택
        <span class="text-xs font-normal text-gray-400 ml-2">복수 선택 가능 · 미선택 시 전체</span>
      </h2>
      <div class="flex gap-2">
        <button onclick="selectAllCats()" class="text-xs text-blue-500 border border-blue-200 px-3 py-1 rounded-lg hover:bg-blue-50">전체 선택</button>
        <button onclick="clearCats()"     class="text-xs text-gray-500 border border-gray-200 px-3 py-1 rounded-lg hover:bg-gray-50">선택 해제</button>
      </div>
    </div>
    <!-- 과목 카드 그리드 -->
    <div id="catGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3"></div>
  </div>

  <!-- ══ STEP 3 : 세부 항목 선택 ════════════════════════════════════ -->
  <div id="itemSection" class="hidden bg-white rounded-xl shadow-sm border border-gray-100 p-5">
    <div class="flex items-center justify-between flex-wrap gap-2 mb-3">
      <h2 class="flex items-center text-base font-semibold text-gray-700">
        <span class="step-badge" id="s3badge">3</span>
        세부 항목 선택
        <span class="text-xs font-normal text-gray-400 ml-2">선택된 과목 내 항목 표시</span>
      </h2>
      <div class="flex gap-2">
        <button onclick="selAllItems()"   class="text-xs text-blue-500 border border-blue-200 px-3 py-1 rounded-lg hover:bg-blue-50">전체 선택</button>
        <button onclick="clearItems()"    class="text-xs text-gray-500 border border-gray-200 px-3 py-1 rounded-lg hover:bg-gray-50">선택 해제</button>
      </div>
    </div>
    <input id="itemSearch" type="text" placeholder="🔍 항목명 검색..." oninput="renderItemChips()"
      class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-blue-300">
    <div id="itemChips" class="max-h-52 overflow-y-auto"></div>
    <p class="text-xs text-gray-400 mt-2">
      선택 항목: <strong id="selItemCnt" class="text-blue-600">0</strong>개 ·
      해당 데이터: <strong id="filtCnt" class="text-gray-600">0</strong>건
    </p>
  </div>

  <!-- ══ STEP 4 : 결과 테이블 ══════════════════════════════════════ -->
  <div id="resultSection" class="hidden bg-white rounded-xl shadow-sm border border-gray-100 p-5">
    <div class="flex items-center justify-between flex-wrap gap-2 mb-4">
      <h2 class="flex items-center text-base font-semibold text-gray-700">
        <span class="step-badge done">4</span>
        병원별 비급여 진료비 현황
      </h2>
      <div class="flex flex-wrap gap-2">
        <input id="tblSearch" type="text" placeholder="🔍 기관명 검색..." oninput="renderTable(1)"
          class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 w-40">
        <button onclick="exportExcel()"
          class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-1.5 rounded-lg text-sm font-semibold transition flex items-center gap-1">
          📥 Excel 저장
        </button>
      </div>
    </div>
    <div class="overflow-x-auto rounded-lg border border-gray-100">
      <table class="w-full text-sm border-collapse">
        <thead>
          <tr class="bg-blue-50 text-blue-800 text-xs">
            <th class="px-3 py-2.5 text-left" onclick="sortBy('yadmNm')">기관명<span class="si"></span></th>
            <th class="px-3 py-2.5 text-left" onclick="sortBy('sidoCdNm')">시도<span class="si"></span></th>
            <th class="px-3 py-2.5 text-left" onclick="sortBy('sgguCdNm')">시군구<span class="si"></span></th>
            <th class="px-3 py-2.5 text-left" onclick="sortBy('clCdNm')">종별<span class="si"></span></th>
            <th class="px-3 py-2.5 text-left" onclick="sortBy('_itemName')">비급여 항목명<span class="si"></span></th>
            <th class="px-3 py-2.5 text-right" onclick="sortBy('_curAmt')">현재금액<span class="si"></span></th>
            <th class="px-3 py-2.5 text-right" onclick="sortBy('_minAmt')">최저금액<span class="si"></span></th>
            <th class="px-3 py-2.5 text-right" onclick="sortBy('_maxAmt')">최고금액<span class="si"></span></th>
          </tr>
        </thead>
        <tbody id="tblBody" class="divide-y divide-gray-50 text-gray-700"></tbody>
      </table>
    </div>
    <div class="flex items-center justify-between mt-3 text-sm text-gray-500 flex-wrap gap-2">
      <span id="pageInfo"></span>
      <div id="pageBtns" class="flex gap-1 flex-wrap"></div>
    </div>
  </div>

  <!-- ══ STEP 4 : 항목별 평균 요약 ════════════════════════════════ -->
  <div id="summarySection" class="hidden bg-white rounded-xl shadow-sm border border-gray-100 p-5">
    <h2 class="flex items-center text-base font-semibold text-gray-700 mb-4">
      <span class="step-badge done">📊</span>
      비급여 항목별 평균 요약
    </h2>
    <!-- 카드 -->
    <div id="sumCards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 mb-5"></div>
    <!-- 테이블 -->
    <div class="overflow-x-auto rounded-lg border border-gray-100">
      <table class="w-full text-sm border-collapse">
        <thead>
          <tr class="bg-blue-50 text-blue-800 text-xs">
            <th class="px-3 py-2.5 text-left">비급여 항목명</th>
            <th class="px-3 py-2.5 text-left">과목</th>
            <th class="px-3 py-2.5 text-right">기관 수</th>
            <th class="px-3 py-2.5 text-right">평균 금액</th>
            <th class="px-3 py-2.5 text-right">중간값</th>
            <th class="px-3 py-2.5 text-right">최저 금액</th>
            <th class="px-3 py-2.5 text-right">최고 금액</th>
            <th class="px-3 py-2.5 text-left">🏆 최고가 병원</th>
            <th class="px-3 py-2.5 text-right">지역 수</th>
          </tr>
        </thead>
        <tbody id="sumBody" class="divide-y divide-gray-50"></tbody>
      </table>
    </div>
  </div>

</div><!-- /container -->

<!-- ══════════════════════════════════════════════════════════════════
     JavaScript
═══════════════════════════════════════════════════════════════════ -->
<script>

// 데이터 로드 후: 실제 API 데이터의 sgguCdNm 값으로 칩 재구성 (100% 정확 매칭)
function buildSgguChips(){
  const actualNames=[...new Set(
    allData.map(r=>(r.sgguCdNm||'').trim()).filter(Boolean)
  )].sort((a,b)=>a.localeCompare(b,'ko'));
  if(!actualNames.length) return;
  // 시도 접두어 제거용 (API가 "울산남구" 형태로 줄 때 → "남구"로 표시)
  const sidoCdNm=(allData.find(r=>r.sidoCdNm)?.sidoCdNm||'').trim();
  const row=$('sgguRow'), wrap=$('sgguChips');
  const prevSel=new Set([...selSggu]);
  selSggu.clear();
  wrap.innerHTML='';
  actualNames.forEach(nm=>{
    const c=document.createElement('span');
    c.className='chip';
    // 표시명: 시도 접두어 제거해서 깔끔하게
    let display=nm;
    if(sidoCdNm && nm.startsWith(sidoCdNm)){
      const stripped=nm.slice(sidoCdNm.length).trim();
      if(stripped) display=stripped;
    }
    c.textContent=display;
    c.dataset.actualNm=nm; // 실제 API 값 저장 (필터링에 사용)
    if(prevSel.has(nm)||prevSel.has(display)){ c.classList.add('on'); selSggu.add(nm); }
    c.onclick=()=>{
      selSggu.has(nm)?selSggu.delete(nm):selSggu.add(nm);
      c.classList.toggle('on');
      if(allData.length>0) applyFilter();
    };
    wrap.appendChild(c);
  });
  row.classList.remove('hidden');
}

// ─── fetch with timeout ─────────────────────────────────────────
async function fetchWithTimeout(url, ms=30000){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),ms);
  try{
    const r=await fetch(url,{signal:ctrl.signal});
    return r;
  } finally {
    clearTimeout(tid);
  }
}

// ─── XML 파싱 ──────────────────────────────────────────────────
function parseXML(text) {
  const doc = new DOMParser().parseFromString(text,'text/xml');
  // XML 파싱 에러 확인
  if(doc.querySelector('parsererror')) return {rc:'PARSE_ERR',rm:'XML 파싱 실패',totalCount:0,items:[]};
  const rc  = doc.querySelector('resultCode')?.textContent?.trim();
  const rm  = doc.querySelector('resultMsg')?.textContent?.trim();
  const tc  = parseInt(doc.querySelector('totalCount')?.textContent||'0');
  const items=[];
  doc.querySelectorAll('item').forEach(el=>{
    const o={};
    el.childNodes.forEach(n=>{ if(n.nodeType===1) o[n.tagName]=n.textContent?.trim()||''; });
    if(Object.keys(o).length) items.push(o);
  });
  return {rc,rm,totalCount:tc,items};
}

// ─── API 에러코드 → 한국어 메시지 ─────────────────────────────
const RC_MSG = {
  '01':'어플리케이션 에러', '02':'DB 에러', '03':'데이터 없음',
  '04':'HTTP 에러', '05':'서비스 연결 실패', '10':'잘못된 요청 파라미터',
  '11':'필수 요청 파라미터 누락', '12':'해당 오픈API 서비스 없음',
  '20':'서비스 접근 거부', '21':'일시적 접근 차단',
  '22':'서비스 키 미등록', '23':'서비스 키 사용 기간 만료',
  '30':'일일 트래픽 초과', '31':'분당 트래픽 초과',
};

// ─── 단일 페이지 fetch ─────────────────────────────────────────
async function fetchPage(extra,page){
  const p=new URLSearchParams({pageNo:page,numOfRows:1000,...extra});
  const url=`/api/proxy?${p}`;
  let r;
  try {
    r = await fetchWithTimeout(url, 30000);
  } catch(e) {
    if(e.name==='AbortError') throw new Error('요청 시간 초과 (30초). 조건을 좁혀서 다시 시도해주세요.');
    throw e;
  }
  if(!r.ok) throw new Error(`서버 오류 (HTTP ${r.status})`);
  const txt=await r.text();

  // JSON 시도
  try {
    const j=JSON.parse(txt);
    const hd=j?.response?.header||{};
    const bd=j?.response?.body||{};
    let it=bd.items?.item??bd.items??[];
    if(!Array.isArray(it)) it=it?[it]:[];
    const tc=parseInt(bd.totalCount??'0');
    return {rc:String(hd.resultCode||'00'),rm:hd.resultMsg||'',totalCount:tc,items:it};
  } catch{}

  // XML 파싱
  const parsed = parseXML(txt);
  return parsed;
}

// ─── 데이터 로드 메인 ──────────────────────────────────────────
async function loadData(){
  if(busy) return;
  busy=true;
  hideErr();
  setBusy(true);
  allData=[];
  selItems.clear();
  ['itemSection','resultSection','summarySection'].forEach(id=>$(id).classList.add('hidden'));

  const s=$('sido').value;
  const sidoLabel=s?$('sido').options[$('sido').selectedIndex].text:'전체';
  const clLabels=selClCd.size>0?[...selClCd].map(cd=>CL_NM[cd]).join(', '):'전체 종별';
  const condLabel=`${sidoLabel} / ${clLabels}`;
  showP(true,2,`[${condLabel}] 데이터 요청 중...`);

  // 선택된 종별 목록 (없으면 전체 = 코드 없이 1회 호출)
  const targets=selClCd.size>0?[...selClCd]:[''];

  let ok=false;
  let lastErr='';

  try{
    for(let ti=0;ti<targets.length;ti++){
      const cd=targets[ti];
      const ex={};
      if(s)  ex.sidoCd=s;
      if(cd) ex.clCd=cd;
      const label=cd?CL_NM[cd]:'전체';

      let page=1, total=0, batch=[], retryCount=0;
      while(true){
        let res;
        try {
          res=await fetchPage(ex,page);
        } catch(e) {
          if(retryCount<2 && (e.message.includes('시간 초과')||e.message.includes('HTTP 5'))){
            retryCount++;
            showP(true,null,`[${label}] 재시도 중 (${retryCount}/2)...`);
            await delay(2000);
            continue;
          }
          throw e;
        }
        retryCount=0;

        const rc=String(res.rc||'00').replace(/^0+/,'') || '0';
        if(!['0','00','000','0000'].includes(rc) && rc!==''){
          const rcMsg=RC_MSG[rc]||res.rm||'알 수 없는 오류';
          throw new Error(`API 오류 [${res.rc}]: ${rcMsg}`);
        }

        const itemLen=res.items?.length||0;
        if(res.totalCount>0) total=res.totalCount;
        else if(total===0 && itemLen>0) total=itemLen*2;
        if(itemLen===0) break;

        batch.push(...res.items);
        const basePct=(ti/targets.length)*97;
        const subPct=total>0?Math.min((batch.length/total)*97,97):50;
        showP(true, basePct+(subPct/targets.length),
          `[${label}] ${batch.length.toLocaleString()} / ${total.toLocaleString()}건 수집 중...`);

        if(batch.length>=total) break;
        page++;
        await delay(150);
      }
      allData.push(...batch);
    }

    if(allData.length>0) ok=true;
    else lastErr='조건에 맞는 데이터가 없습니다.';

  } catch(e){
    lastErr=e.message;
  }

  showP(false);
  setBusy(false);
  busy=false;

  if(ok){
    allData.forEach(r=>{
      r._curAmt=num(r.curAmt);
      r._minAmt=num(r.minAmt);
      r._maxAmt=num(r.maxAmt);
      r._itemName=getItem(r);
      r._catId=getCatForItem(r._itemName);
    });
    buildCatMap();
    buildCatGrid();
    buildSgguChips();
    applyFilter();
    $('statusMsg').textContent=`✅ ${allData.length.toLocaleString()}건 로드 완료`;
    $('s1badge').classList.add('done');
    updateHeader();
  } else {
    const emptyMsg = lastErr || '데이터가 없습니다. 조건을 변경해 보세요.';
    showErr(`⚠️ ${emptyMsg}`);
  }
}

// ─── 카테고리 카드 레코드수 업데이트 (baseData 기준) ─────────────
function updateCatCounts(baseData){
  const counts={};
  [...CATS,CAT_ETC].forEach(c=>counts[c.id]=0);
  baseData.forEach(r=>{ if(r._catId && counts[r._catId]!==undefined) counts[r._catId]++; });
  [...CATS,CAT_ETC].forEach(cat=>{
    const cnt=counts[cat.id]||0;
    const cntEl=document.getElementById(`cnt_${cat.id}`);
    const subEl=document.getElementById(`sub_${cat.id}`);
    const card=$('catGrid').querySelector(`[data-id="${cat.id}"]`);
    if(cntEl) cntEl.textContent=cnt>0?cnt.toLocaleString():'-';
    if(subEl) subEl.textContent=cnt>0?`${cnt.toLocaleString()}건`:'해당 없음';
    if(card) card.style.opacity=cnt===0?'0.35':'1';
  });
}

  const s=new Set();
  selCats.forEach(id=>{

// ─── 데이터 필터링 ─────────────────────────────────────────────
function applyFilter(){
  // 구/군 필터 (trim으로 공백 차이 무시)
  let base=allData;
  if(selSggu.size>0) base=base.filter(r=>selSggu.has((r.sgguCdNm||'').trim()));

  // 카테고리 카드 카운트를 구/군 필터 기준으로 갱신
  if(allData.length>0) updateCatCounts(base);

  // 과목 기준
  if(selCats.size>0) base=base.filter(r=>selCats.has(r._catId));

  // 세부 항목
  if(selItems.size>0) filteredData=base.filter(r=>selItems.has(r._itemName));
  else filteredData=[...base];

  $('selItemCnt').textContent=selItems.size;
  $('filtCnt').textContent=filteredData.length.toLocaleString();
  renderTable(1);
  renderSummary();
  updateHeader();
}

    if(th.getAttribute('onclick')===`sortBy('${col}')`)

  renderTable(1);
}

function renderTable(pg){
  curPage=pg;
  const q=($('tblSearch')?.value||'').toLowerCase();
  displayData=filteredData.filter(r=>
    !q||(r.yadmNm||'').toLowerCase().includes(q)||(r.addr||'').toLowerCase().includes(q)
  );
  displayData.sort((a,b)=>{
    let va=a[sortKey]??'',vb=b[sortKey]??'';
    if(typeof va==='number'&&typeof vb==='number') return(va-vb)*sortDir;
    const na=+String(va).replace(/,/g,''),nb=+String(vb).replace(/,/g,'');
    if(!isNaN(na)&&!isNaN(nb)) return(na-nb)*sortDir;
    return String(va).localeCompare(String(vb),'ko')*sortDir;
  });
  const total=displayData.length, pages=Math.max(1,Math.ceil(total/PAGE_SZ));
  const start=(curPage-1)*PAGE_SZ, slice=displayData.slice(start,start+PAGE_SZ);

  const tbody=$('tblBody');
  if(!slice.length){
    let emptyMsg='데이터 없음';
    if(allData.length>0 && selSggu.size>0 && selCats.size>0)
      emptyMsg=`선택한 구/군에 해당 과목 데이터가 없습니다`;
    else if(allData.length>0 && selSggu.size>0)
      emptyMsg=`선택한 구/군에 해당 데이터가 없습니다`;
    else if(allData.length>0 && q)
      emptyMsg=`'${q}' 검색 결과 없음`;
    tbody.innerHTML=`<tr><td colspan="8" class="text-center py-10 text-gray-400">${emptyMsg}</td></tr>`;
    $('resultSection').classList.remove('hidden');
    return;
  }
  tbody.innerHTML=slice.map(r=>{
    const catName=(CATS.find(c=>c.id===r._catId)||CAT_ETC).icon;
    return`<tr class="border-b border-gray-50">
      <td class="px-3 py-2 font-medium text-gray-800 max-w-[150px] truncate" title="${r.yadmNm||''}">${r.yadmNm||'-'}</td>
      <td class="px-3 py-2 text-gray-600 whitespace-nowrap">${r.sidoCdNm||''}</td>
      <td class="px-3 py-2 text-gray-600 whitespace-nowrap">${r.sgguCdNm||''}</td>
      <td class="px-3 py-2"><span style="font-size:11px;padding:2px 7px;border-radius:999px;background:#eff6ff;color:#1d4ed8">${r.clCdNm||'-'}</span></td>
      <td class="px-3 py-2 text-gray-700">${catName} ${r._itemName||'-'}</td>
      <td class="px-3 py-2 text-right font-semibold text-gray-800">${fmt(r.curAmt)}</td>
      <td class="px-3 py-2 text-right text-emerald-600">${fmt(r.minAmt)}</td>
      <td class="px-3 py-2 text-right text-rose-500">${fmt(r.maxAmt)}</td>
    </tr>`;
  }).join('');

  $('pageInfo').textContent=`전체 ${total.toLocaleString()}건 중 ${start+1}–${Math.min(start+PAGE_SZ,total)}건`;
  const ws=Math.max(1,curPage-3), we=Math.min(pages,ws+6), bs=[];
  if(curPage>1) bs.push(`<button onclick="renderTable(${curPage-1})" class="px-2.5 py-1 border border-gray-200 rounded text-xs hover:bg-gray-50">‹</button>`);
  for(let p=ws;p<=we;p++){
    const a=p===curPage?'bg-blue-600 text-white border-blue-600':'border-gray-200 hover:bg-gray-50';
    bs.push(`<button onclick="renderTable(${p})" class="px-2.5 py-1 border rounded text-xs ${a}">${p}</button>`);
  }
  if(curPage<pages) bs.push(`<button onclick="renderTable(${curPage+1})" class="px-2.5 py-1 border border-gray-200 rounded text-xs hover:bg-gray-50">›</button>`);
  $('pageBtns').innerHTML=bs.join('');
  $('resultSection').classList.remove('hidden');
}

// ─── 요약 ──────────────────────────────────────────────────────
function renderSummary(){
  const map={};
  filteredData.forEach(r=>{
    const n=r._itemName; if(!n) return;
    if(!map[n]) map[n]={vals:[],records:[],regions:new Set(),catId:r._catId};
    const v=r._curAmt;
    if(v!==null){ map[n].vals.push(v); map[n].records.push(r); }
    if(r.sidoCdNm) map[n].regions.add(r.sidoCdNm);
  });

  const rows=Object.entries(map).map(([name,d])=>{
    const a=d.vals, avg=a.length?Math.round(a.reduce((s,v)=>s+v,0)/a.length):null;
    const maxVal=a.length?Math.max(...a):null;
    // 최고가 병원: 현재금액이 maxVal인 첫 번째 레코드
    const maxRec=maxVal!==null?d.records.find(r=>r._curAmt===maxVal):null;
    const maxHospName=maxRec?.yadmNm||'-';
    const maxHospSido=maxRec?.sidoCdNm||'';
    const maxHospGu=maxRec?.sgguCdNm||'';
    return{name,cat:(CATS.find(c=>c.id===d.catId)||CAT_ETC),count:a.length,avg,
           med:a.length?Math.round(med(a)):null,
           min:a.length?Math.min(...a):null,max:maxVal,
           maxHospName,maxHospSido,maxHospGu,regions:d.regions.size};
  }).sort((a,b)=>(b.avg||0)-(a.avg||0));

  if(!rows.length) return;

  $('sumCards').innerHTML=rows.slice(0,6).map(r=>`
    <div class="sum-card">
      <p class="text-xs text-gray-500 truncate mb-1">${r.cat.icon} ${r.name}</p>
      <p class="text-2xl font-bold text-blue-700">${r.avg!==null?r.avg.toLocaleString()+'원':'-'}</p>
      <p class="text-xs text-gray-500 mt-1">평균 · 기관 <strong>${r.count.toLocaleString()}</strong>곳 · ${r.regions}개 지역</p>
      <div class="flex gap-3 mt-2 text-xs">
        <span class="text-emerald-600">▼ ${r.min!==null?r.min.toLocaleString()+'원':'-'}</span>
        <span class="text-rose-500">▲ ${r.max!==null?r.max.toLocaleString()+'원':'-'}</span>
      </div>
      ${r.maxHospName!=='-'?`<div class="mt-2 pt-2 border-t border-blue-100 text-xs text-gray-500">
        🏆 최고가: <strong class="text-rose-600">${r.maxHospName}</strong>
        ${r.maxHospSido?`<span class="text-gray-400">(${r.maxHospSido} ${r.maxHospGu})</span>`:''}
      </div>`:''}
    </div>`).join('');

  $('sumBody').innerHTML=rows.map((r,i)=>`
    <tr class="${i%2?'bg-gray-50/40':''}">
      <td class="px-3 py-2.5 font-medium text-gray-800">${r.cat.icon} ${r.name}</td>
      <td class="px-3 py-2.5 text-xs text-gray-500">${r.cat.name}</td>
      <td class="px-3 py-2.5 text-right text-gray-600">${r.count.toLocaleString()}개</td>
      <td class="px-3 py-2.5 text-right font-bold text-blue-700">${r.avg!==null?r.avg.toLocaleString()+'원':'-'}</td>
      <td class="px-3 py-2.5 text-right text-gray-600">${r.med!==null?r.med.toLocaleString()+'원':'-'}</td>
      <td class="px-3 py-2.5 text-right text-emerald-600">${r.min!==null?r.min.toLocaleString()+'원':'-'}</td>
      <td class="px-3 py-2.5 text-right text-rose-500 font-semibold">${r.max!==null?r.max.toLocaleString()+'원':'-'}</td>
      <td class="px-3 py-2.5">
        <div class="font-medium text-gray-800 text-xs">${r.maxHospName}</div>
        ${r.maxHospSido?`<div class="text-gray-400 text-xs">${r.maxHospSido} ${r.maxHospGu}</div>`:''}
      </td>
      <td class="px-3 py-2.5 text-right text-gray-500">${r.regions}개</td>
    </tr>`).join('');

  $('summarySection').classList.remove('hidden');
}

// ─── Excel 저장 ────────────────────────────────────────────────
function exportExcel(){
  if(!filteredData.length){alert('데이터가 없습니다.');return;}
  const wb=XLSX.utils.book_new();

  // 시트1: 병원별
  const h=['기관명','시도','시군구','종별','과목','비급여항목명','현재금액','최저금액','최고금액'];
  const rows=filteredData.map(r=>{
    const cat=(CATS.find(c=>c.id===r._catId)||CAT_ETC).name;
    return[r.yadmNm||'',r.sidoCdNm||'',r.sgguCdNm||'',r.clCdNm||'',cat,
           r._itemName||'',r._curAmt,r._minAmt,r._maxAmt];
  });
  const ws1=XLSX.utils.aoa_to_sheet([h,...rows]);
  ws1['!cols']=[18,7,9,9,14,30,12,12,12].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws1,'병원별 데이터');

  // 시트2: 항목별 평균 + 최고가 병원
  const map2={};
  filteredData.forEach(r=>{
    const n=r._itemName; if(!n) return;
    if(!map2[n]) map2[n]={vals:[],records:[],cat:(CATS.find(c=>c.id===r._catId)||CAT_ETC).name};
    if(r._curAmt!==null){map2[n].vals.push(r._curAmt);map2[n].records.push(r);}
  });
  const sr=Object.entries(map2).map(([n,d])=>{
    const a=d.vals,avg=a.length?Math.round(a.reduce((s,v)=>s+v,0)/a.length):null;
    const maxVal=a.length?Math.max(...a):null;
    const maxRec=maxVal!==null?d.records.find(r=>r._curAmt===maxVal):null;
    return[d.cat,n,a.length,avg,a.length?Math.round(med(a)):null,
           a.length?Math.min(...a):null,maxVal,
           maxRec?.yadmNm||'-',
           maxRec?(maxRec.sidoCdNm||'')+(maxRec.sgguCdNm?' '+maxRec.sgguCdNm:''):''];
  }).sort((a,b)=>(b[3]||0)-(a[3]||0));
  const ws2=XLSX.utils.aoa_to_sheet([
    ['과목','비급여항목명','건수','평균금액','중간값','최저금액','최고금액','최고가 병원','위치'],
    ...sr]);
  ws2['!cols']=[14,32,8,12,12,12,12,20,12].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws2,'항목별 평균');

  const now=new Date().toISOString().slice(0,16).replace(/[-T:]/g,(m,i)=>i===10?'_':m==='T'?'_':'');
  XLSX.writeFile(wb,`비급여진료비_${now}.xlsx`);
}

// ─── 헤더 통계 ─────────────────────────────────────────────────
function updateHeader(){
  if(!allData.length){$('hdrStats').classList.add('hidden');return;}
  $('hdrStats').innerHTML=`
    <div>전체 <strong>${allData.length.toLocaleString()}</strong>건 로드됨</div>
    <div>표시 <strong>${filteredData.length.toLocaleString()}</strong>건</div>`;
  $('hdrStats').classList.remove('hidden');
}

// ─── 기타 UI ──────────────────────────────────────────────────
function setBusy(v){
  $('btnIco').textContent=v?'⏳':'📥';
  $('btnTxt').textContent=v?'불러오는 중...':'데이터 불러오기';
  $('loadBtn').disabled=v;
}
function showP(v,pct=0,txt=''){
  $('pWrap').classList.toggle('hidden',!v);
  $('pFill').style.width=pct+'%';
  $('pTxt').textContent=txt;
}
function showErr(msg){$('errBox').innerHTML=msg;$('errBox').classList.remove('hidden');}
function hideErr(){$('errBox').classList.add('hidden');$('errBox').innerHTML='';}
function resetAll(){
  allData=[];filteredData=[];displayData=[];
  selCats.clear();selItems.clear();
  selClCd.clear(); selClCd.add('21');
  document.querySelectorAll('#clCdChips .chip').forEach(c=>{
    c.classList.toggle('on', c.dataset.cd==='21');
  });
  selSggu.clear();
  $('sgguChips').querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  // catSection은 유지, 나머지만 숨김
  ['itemSection','resultSection','summarySection'].forEach(id=>$(id).classList.add('hidden'));
  ['s1badge','s2badge','s3badge'].forEach(id=>{const el=$(id);if(el)el.classList.remove('done');});
  // 카드 항목수 초기화
  [...CATS,CAT_ETC].forEach(cat=>{
    const el=document.getElementById(`cnt_${cat.id}`);
    const sub=document.getElementById(`sub_${cat.id}`);
    if(el) el.textContent='-';
    if(sub) sub.textContent='과목 선택';
    const card=$('catGrid').querySelector(`[data-id="${cat.id}"]`);
    if(card){card.classList.remove('on');card.style.opacity='1';}
  });
  hideErr();showP(false);
  $('statusMsg').textContent='';
  $('hdrStats').classList.add('hidden');
  setBusy(false);busy=false;
}
